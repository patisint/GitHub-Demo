on:
    workflow_dispatch:
  jobs:
    build:
      runs-on: ubunut-latest
      step:
        - name: Checkout Source code
          uses: actions/checkout@v7.0.0
          with:
            repository: ${{ github.repository }}
            ref: ${{ github.ref_name }}
        - name: List files in workspaces
          run: ls ${{ github.workspace }}
